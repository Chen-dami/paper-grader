llm:
  provider: deepseek
  api_key: ''
  base_url: ''
  model: deepseek-chat
  vision_model: deepseek-chat
  max_tokens: 2048
  temperature: 0.3
grading:
  mode: relaxed
  pass_line: 60
  tiers:
    贴合主题:
      ratio_min: 0.9
      ratio_max: 1.0
    跑题:
      ratio_min: 0.45
      ratio_max: 0.55
    有视频:
      ratio_min: 0.8
      ratio_max: 0.95
    无视频:
      ratio_min: 0.5
      ratio_max: 0.65
    有截图:
      ratio_min: 0.7
      ratio_max: 0.85
    无截图:
      ratio_min: 0.5
      ratio_max: 0.65
    敷衍:
      ratio_min: 0.4
      ratio_max: 0.5
    空:
      ratio_min: 0.0
      ratio_max: 0.0
  code_base_ratio: 0.6
custom_presets: {}
image:
  max_width: 768
  quality: 75
  skip_below_kb: 50
scope:
  question_ids: []
  student_ids: []
  start_index: 0
  max_papers: 0
output:
  format: excel
  individual_reports: true
  summary_report: true
database:
  type: sqlite
  sqlite_path: db.sqlite3
agent_test:
  enabled: false
  timeout: 15
  headless: true
