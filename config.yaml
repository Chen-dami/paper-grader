llm:
  provider: deepseek
  api_key: ''
  base_url: ''
  model: deepseek-chat
  vision_model: deepseek-chat
  max_tokens: 2048
  temperature: 0.3
grading:
  mode: custom
  pass_line: 60
  tiers:
    贴合主题:
      ratio_min: 0.9
      ratio_max: 1.0
      desc: '主题匹配，素材完整'
    仅截图:
      ratio_min: 0.7
      ratio_max: 0.8
      desc: '结果以截图呈现，非原始文本'
    无视频:
      ratio_min: 0.7
      ratio_max: 0.8
      desc: '缺少视频文件'
    无图像:
      ratio_min: 0.55
      ratio_max: 0.7
      desc: '缺少生成图片'
    无素材:
      ratio_min: 0.35
      ratio_max: 0.5
      desc: '缺少图片和视频素材'
    无链接:
      ratio_min: 0.7
      ratio_max: 0.8
      desc: '缺少发布链接'
    无表格:
      ratio_min: 0.4
      ratio_max: 0.55
      desc: '缺少Excel/表格文件'
    跑题:
      ratio_min: 0.45
      ratio_max: 0.55
      desc: '主题不匹配'
    敷衍:
      ratio_min: 0.4
      ratio_max: 0.5
      desc: '内容过少'
    空:
      ratio_min: 0.0
      ratio_max: 0.0
      desc: '无内容'
  code_base_ratio: 0.6
image:
  max_width: 768
  quality: 75
  skip_below_kb: 50
scope:
  question_ids: []
  student_ids: []
  start_index: 0
  max_papers: 0
output:
  format: excel
  individual_reports: true
  summary_report: true
database:
  type: sqlite
  sqlite_path: db.sqlite3
agent_test:
  enabled: false
  timeout: 15
  headless: true
